name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          COMMIT="${GITHUB_SHA:-}"
          COMMIT="${COMMIT:0:7}"
          DATE="$(date -u +%Y-%m-%d)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}"

          build_one() {
            local goos="$1" goarch="$2"
            local out="m2a"
            local name="m2a_${VERSION}_${goos}_${goarch}"
            if [ "$goos" = "windows" ]; then
              out="m2a.exe"
            fi
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o "dist/${out}" ./cmd/m2a
            (
              cd dist
              if [ "$goos" = "windows" ]; then
                zip "${name}.zip" "$out"
                rm -f "$out"
              else
                tar -czf "${name}.tar.gz" "$out"
                rm -f "$out"
              fi
            )
          }

          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64
          build_one windows amd64

          (cd dist && sha256sum *.tar.gz *.zip > checksums-sha256.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
