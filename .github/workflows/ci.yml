name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Verify module
        run: go mod verify

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o m2a ./cmd/m2a/
